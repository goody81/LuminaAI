apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: bmad-prod
spec:
  interval: 10m
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: bmad-prod
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "59.1.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    # FIX: Removed hardcoded Grafana admin password.
    # The password is now sourced from a Kubernetes secret named 'grafana-admin-credentials'.
    # This secret should be created and managed securely, for example using SOPS, Vault,
    # or another secrets management tool.
    #
    # Example secret manifest:
    # apiVersion: v1
    # kind: Secret
    # metadata:
    #   name: grafana-admin-credentials
    #   namespace: bmad-prod
    # type: Opaque
    # stringData:
    #   admin-user: admin
    #   admin-password: "your-secure-password"
    #
    grafana:
      admin:
        existingSecret: "grafana-admin-credentials"
        userKey: "admin-user"
        passwordKey: "admin-password"
    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 500Gi
