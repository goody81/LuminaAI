apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner
  namespace: bmad-prod
  labels:
    app: planner
    version: v1
    component: ai-planning
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: planner
  template:
    metadata:
      labels:
        app: planner
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: planner
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: planner
        image: bmad/planner:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: health
          containerPort: 8080
          protocol: TCP
        env:
        - name: GRPC_PORT
          value: "50051"
        - name: HEALTH_PORT
          value: "8080"
        - name: LOG_LEVEL
          value: "INFO"
        - name: MAX_WORKERS
          value: "10"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-credentials
              key: api-key
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: planner
  namespace: bmad-prod
---
apiVersion: v1
kind: Service
metadata:
  name: planner
  namespace: bmad-prod
  labels:
    app: planner
spec:
  type: ClusterIP
  selector:
    app: planner
  ports:
    - name: grpc
      protocol: TCP
      port: 50051
      targetPort: grpc
    - name: health
      protocol: TCP
      port: 8080
      targetPort: health
  sessionAffinity: None
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: planner-pdb
  namespace: bmad-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: planner
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: planner-hpa
  namespace: bmad-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: planner
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

