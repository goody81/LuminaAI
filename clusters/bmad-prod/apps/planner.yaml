apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner
  namespace: bmad-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planner
  template:
    metadata:
      labels:
        app: planner
    spec:
      containers:
      - name: planner
        image: bmad/planner:latest
        ports:
        - containerPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: planner
  namespace: bmad-prod
spec:
  selector:
    app: planner
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
